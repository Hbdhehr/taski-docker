version: '3.8'

volumes:
  pg_data:
  static_volume:

services:
  db:
    image: postgres:13.10
    env_file: backend/.env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend/
    env_file: backend/.env
    volumes:
      - static_volume:/app/staticfiles/
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend/
      dockerfile: dockerfile
    volumes:
      - static_volume:/app/build/

  gateway:
    build: ./gateway/
    ports:
      - 8000:80
    volumes:
      - static_volume:/staticfiles/
    depends_on:
      - backend
      - frontend
